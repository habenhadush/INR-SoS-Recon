        huber_delta: {distribution: "log_uniform_values", min: 0.01, max: 2.0}
        clamp_slowness: [true, false]
        early_stopping: [true]
        patience: [50, 100, 200]
        mapping_size: [32, 64, 128]
        scale: {distribution: "uniform", min: 0.1, max: 5.0}
        omega: {distribution: "uniform", min: 10.0, max: 60.0}
        epochs: [100, 150, 200]
        batch_size: [2048, 4096, 8192]
        time_scale: [1e6, 2e7]

