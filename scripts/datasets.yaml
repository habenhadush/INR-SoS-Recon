        hidden_layers: [2, 3, 4, 5]
        lr: {distribution: "log_uniform_values", min: 1e-6, max: 1e-3}
        steps: [200, 500, 750, 1000]
        tv_weight: {distribution: "log_uniform_values", min: 1e-3, max: 1.0}
